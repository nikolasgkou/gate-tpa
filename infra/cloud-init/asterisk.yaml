#cloud-config
package_update: true
packages:
  - asterisk

write_files:
  - path: /usr/local/sbin/gate-tpa-configure-asterisk
    permissions: '0750'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      public_ip="__PUBLIC_IP__"
      sip_port="__SIP_PORT__"
      rtp_start="__RTP_START__"
      rtp_end="__RTP_END__"
      credential_file="/root/gate-tpa-linphone-credentials.txt"
      legacy_credential_file="/root/gate-tpa-linphone-1001.txt"

      extensions=(
        "1001|Emma Newman|child"
        "1002|Sarah Newman|mother"
        "1003|Olivia Descarte|Alzheimer's"
        "1004|Mark Descarte|son and caregiver"
        "1005|Bruce Jameson|in a meeting"
        "1006|John Michaels|employee"
        "1007|Stranger|unknown"
        "1008|Gate AI Agent|Gemini bridge"
      )
      cat > /etc/asterisk/pjsip.conf <<EOF
      [global]
      type=global
      user_agent=GateTPA-PBX

      [transport-udp]
      type=transport
      protocol=udp
      bind=0.0.0.0:${sip_port}
      external_media_address=${public_ip}
      external_signaling_address=${public_ip}
      local_net=10.42.0.0/16

      [transport-tls]
      type=transport
      protocol=tls
      bind=0.0.0.0:5061
      method=tlsv1_2
      external_media_address=${public_ip}
      external_signaling_address=${public_ip}
      local_net=10.42.0.0/16
      EOF

      cat > /etc/asterisk/extensions.conf <<EOF
      [general]
      static=yes
      writeprotect=no
      clearGlobalVars=no

      [globals]

      [gate-internal]
      exten => 600,1,Answer()
       same => n,Playback(demo-echotest)
       same => n,Echo()
       same => n,Hangup()

      exten => 9001,1,NoOp(Gate AI Agent via Gemini bridge extension 1008)
       same => n,Answer()
       same => n,Set(AUDIOSOCKET_UUID=00000000-0000-0000-0000-000000000001)
       same => n,AudioSocket(\${AUDIOSOCKET_UUID},127.0.0.1:9092)
       same => n,Hangup()
      EOF

      cat > "${credential_file}" <<EOF
      SIP server: ${public_ip}
      SIP port: ${sip_port}
      Transport: UDP
      Echo test: 600

      EOF

      for contact in "${extensions[@]}"; do
        IFS='|' read -r extension display_name role <<< "${contact}"

        cat >> /etc/asterisk/pjsip.conf <<EOF

      [${extension}]
      type=endpoint
      transport=transport-udp
      context=gate-internal
      disallow=all
      allow=ulaw
      allow=alaw
      direct_media=no
      rtp_symmetric=yes
      force_rport=yes
      rewrite_contact=yes
      dtmf_mode=rfc4733
      auth=auth${extension}
      aors=${extension}
      callerid=${display_name} <${extension}>

      [auth${extension}]
      type=auth
      auth_type=userpass
      username=${extension}
      password=${extension}

      [${extension}]
      type=aor
      max_contacts=3
      remove_existing=yes
      qualify_frequency=30
      EOF

        cat >> /etc/asterisk/extensions.conf <<EOF

      exten => ${extension},1,Dial(PJSIP/${extension},30)
       same => n,Hangup()
      EOF

        cat >> "${credential_file}" <<EOF
      Username: ${extension}
      Auth username: ${extension}
      Password: ${extension}
      Display name: ${display_name}
      Role: ${role}

      EOF
      done

      cat > /etc/asterisk/rtp.conf <<EOF
      [general]
      rtpstart=${rtp_start}
      rtpend=${rtp_end}
      strictrtp=yes
      icesupport=no
      EOF

      chown asterisk:asterisk /etc/asterisk/pjsip.conf /etc/asterisk/extensions.conf /etc/asterisk/rtp.conf
      chmod 0640 /etc/asterisk/pjsip.conf /etc/asterisk/extensions.conf /etc/asterisk/rtp.conf
      cp "${credential_file}" "${legacy_credential_file}"
      chmod 0600 "${credential_file}" "${legacy_credential_file}"

      systemctl enable asterisk
      systemctl restart asterisk

runcmd:
  - /usr/local/sbin/gate-tpa-configure-asterisk
