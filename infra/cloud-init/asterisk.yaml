#cloud-config
package_update: true
packages:
  - asterisk

write_files:
  - path: /usr/local/sbin/gate-tpa-configure-asterisk
    permissions: '0750'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      public_ip="__PUBLIC_IP__"
      sip_port="__SIP_PORT__"
      rtp_start="__RTP_START__"
      rtp_end="__RTP_END__"
      credential_file="/root/gate-tpa-linphone-credentials.txt"
      legacy_credential_file="/root/gate-tpa-linphone-1001.txt"

      cat > /etc/asterisk/pjsip.conf <<EOF
      [global]
      type=global
      user_agent=GateTPA-PBX

      [transport-udp]
      type=transport
      protocol=udp
      bind=0.0.0.0:${sip_port}
      external_media_address=${public_ip}
      external_signaling_address=${public_ip}
      local_net=10.42.0.0/16
      EOF

      for extension in 1001 1002 1003 1004; do
        cat >> /etc/asterisk/pjsip.conf <<EOF

      [${extension}]
      type=endpoint
      transport=transport-udp
      context=gate-internal
      disallow=all
      allow=ulaw
      allow=alaw
      direct_media=no
      rtp_symmetric=yes
      force_rport=yes
      rewrite_contact=yes
      dtmf_mode=rfc4733
      auth=auth${extension}
      aors=${extension}
      callerid=Gate TPA <${extension}>

      [auth${extension}]
      type=auth
      auth_type=userpass
      username=${extension}
      password=${extension}

      [${extension}]
      type=aor
      max_contacts=3
      remove_existing=yes
      qualify_frequency=30
      EOF
      done

      cat > /etc/asterisk/extensions.conf <<'EOF'
      [general]
      static=yes
      writeprotect=no
      clearGlobalVars=no

      [globals]

      [gate-internal]
      exten => 600,1,Answer()
       same => n,Playback(demo-echotest)
       same => n,Echo()
       same => n,Hangup()

      exten => 1001,1,Dial(PJSIP/1001,30)
       same => n,Hangup()

      exten => 1002,1,Dial(PJSIP/1002,30)
       same => n,Hangup()

      exten => 1003,1,Dial(PJSIP/1003,30)
       same => n,Hangup()

      exten => 1004,1,Dial(PJSIP/1004,30)
       same => n,Hangup()
      EOF

      cat > /etc/asterisk/rtp.conf <<EOF
      [general]
      rtpstart=${rtp_start}
      rtpend=${rtp_end}
      strictrtp=yes
      icesupport=no
      EOF

      chown asterisk:asterisk /etc/asterisk/pjsip.conf /etc/asterisk/extensions.conf /etc/asterisk/rtp.conf
      chmod 0640 /etc/asterisk/pjsip.conf /etc/asterisk/extensions.conf /etc/asterisk/rtp.conf

      cat > "${credential_file}" <<EOF
      SIP server: ${public_ip}
      SIP port: ${sip_port}
      Transport: UDP
      Echo test: 600

      Username: 1001
      Auth username: 1001
      Password: 1001

      Username: 1002
      Auth username: 1002
      Password: 1002

      Username: 1003
      Auth username: 1003
      Password: 1003

      Username: 1004
      Auth username: 1004
      Password: 1004
      EOF
      cp "${credential_file}" "${legacy_credential_file}"
      chmod 0600 "${credential_file}" "${legacy_credential_file}"

      systemctl enable asterisk
      systemctl restart asterisk

runcmd:
  - /usr/local/sbin/gate-tpa-configure-asterisk
